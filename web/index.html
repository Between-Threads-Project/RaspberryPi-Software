<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Marionnette Control Hub</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap");
            body {
                font-family: "Inter", sans-serif;
                background-color: #0f172a;
                color: #f8fafc;
            }
            .glass {
                background: rgba(30, 41, 59, 0.7);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .status-dot {
                height: 10px;
                width: 10px;
                border-radius: 50%;
                display: inline-block;
            }
        </style>
    </head>
    <body class="p-4 md:p-8">
        <div class="max-w-4xl mx-auto">
            <header class="flex items-center justify-between mb-8">
                <div>
                    <h1
                        class="text-3xl font-bold tracking-tight text-white flex items-center gap-2"
                    >
                        <i data-lucide="cpu" class="text-blue-400"></i>
                        Between Threads Dashboard
                    </h1>
                    <p class="text-slate-400 text-sm">
                        Contrôle de la Raspberry Pi et des moteurs
                    </p>
                </div>
                <div
                    id="connection-badge"
                    class="px-3 py-1 rounded-full text-xs font-medium bg-red-500/20 text-red-400 border border-red-500/50"
                >
                    Déconnecté
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-1 space-y-4">
                    <h2
                        class="text-lg font-semibold mb-4 flex items-center gap-2"
                    >
                        <i data-lucide="play-circle" class="w-5 h-5"></i>
                        Actions
                    </h2>

                    <button
                        onclick="send('/start')"
                        class="w-full flex items-center justify-between p-4 glass rounded-xl hover:bg-green-500/20 transition-all group"
                    >
                        <span>Position de départ</span>
                        <i
                            data-lucide="play"
                            class="w-5 h-5 text-green-400 group-hover:scale-110"
                        ></i>
                    </button>

                    <button
                        onclick="send('/main')"
                        class="w-full flex items-center justify-between p-4 glass rounded-xl hover:bg-blue-500/20 transition-all group"
                    >
                        <span>Lancer l'écoute</span>
                        <i
                            data-lucide="activity"
                            class="w-5 h-5 text-blue-400 group-hover:scale-110"
                        ></i>
                    </button>

                    <button
                        onclick="send('/end')"
                        class="w-full flex items-center justify-between p-4 glass rounded-xl hover:bg-red-500/20 transition-all group"
                    >
                        <span>Position de fin</span>
                        <i
                            data-lucide="square"
                            class="w-5 h-5 text-red-400 group-hover:scale-110"
                        ></i>
                    </button>
                </div>

                <div class="md:col-span-2">
                    <h2
                        class="text-lg font-semibold mb-4 flex items-center gap-2"
                    >
                        <i data-lucide="settings-2" class="w-5 h-5"></i> État
                        des Servomoteurs
                    </h2>
                    <div class="glass rounded-2xl p-6 min-h-[300px]">
                        <div
                            id="servo-container"
                            class="grid grid-cols-2 gap-4"
                        >
                            <div
                                class="col-span-2 flex flex-col items-center justify-center py-12 text-slate-500"
                            >
                                <i
                                    data-lucide="refresh-cw"
                                    class="w-8 h-8 animate-spin mb-2"
                                ></i>
                                <p>En attente de données...</p>
                            </div>
                        </div>

                        <div class="mt-6 pt-6 border-t border-white/10">
                            <p
                                class="text-xs text-slate-500 uppercase font-bold mb-2"
                            >
                                Raw JSON Data
                            </p>
                            <pre
                                id="state"
                                class="text-[10px] text-blue-300 bg-black/30 p-3 rounded-lg overflow-x-auto"
                            ></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Initialisation des icônes
            lucide.createIcons();

            function send(route) {
                fetch(route, { method: "POST" })
                    .then(() => console.log(`Route ${route} envoyée`))
                    .catch((err) => console.error("Erreur:", err));
            }

            const ws = new WebSocket(`ws://${location.host}/ws`);
            const badge = document.getElementById("connection-badge");

            ws.onopen = () => {
                badge.textContent = "Connecté";
                badge.className =
                    "px-3 py-1 rounded-full text-xs font-medium bg-green-500/20 text-green-400 border border-green-500/50";
            };

            ws.onclose = () => {
                badge.textContent = "Déconnecté";
                badge.className =
                    "px-3 py-1 rounded-full text-xs font-medium bg-red-500/20 text-red-400 border border-red-500/50";
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                // Mise à jour du JSON brut
                document.getElementById("state").textContent = JSON.stringify(
                    data,
                    null,
                    2,
                );

                // Mise à jour visuelle des servos
                const container = document.getElementById("servo-container");
                container.innerHTML = ""; // On vide pour reconstruire proprement

                Object.entries(data).forEach(([key, value]) => {
                    const card = document.createElement("div");
                    card.className =
                        "bg-white/5 p-4 rounded-lg border border-white/5";
                    card.innerHTML = `
                    <div class="text-xs text-slate-400 uppercase font-bold">${key}</div>
                    <div class="text-2xl font-mono text-white">${value}°</div>
                    <div class="w-full bg-slate-700 h-1.5 mt-3 rounded-full overflow-hidden">
                        <div class="bg-blue-500 h-full transition-all duration-300" style="width: ${(value / 180) * 100}%"></div>
                    </div>
                `;
                    container.appendChild(card);
                });
            };
        </script>
    </body>
</html>
